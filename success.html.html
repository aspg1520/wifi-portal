<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connected - ART WIFI</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle, #020617, #000);
    color:white;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* MAIN BOX */
.box {
    padding:30px;
    border-radius:20px;
    /* Changed to Blue */
    border:2px solid #3b82f6;
    box-shadow:
        0 0 10px #3b82f6,
        0 0 30px #3b82f6;
    animation: glow 1.5s infinite alternate;
}

/* LOGO */
.logo {
    width:120px;
    margin-bottom:15px;
    animation: float 2s ease-in-out infinite;
    /* Added blue drop shadow */
    filter: drop-shadow(0 0 10px #3b82f6);
}

/* ANIMATIONS */
@keyframes glow {
    from { box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
    to { box-shadow: 0 0 40px rgba(59, 130, 246, 0.8); }
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* TEXT */
h1 {
    font-size:26px;
    margin:10px 0;
    /* Blue shadow for text */
    text-shadow:0 0 10px #3b82f6;
}

p {
    font-size:15px;
    opacity:0.9;
}

/* SPEED METER */
.speed {
    margin-top:15px;
    font-size:18px;
    /* Changed to Blue */
    color:#3b82f6;
    text-shadow:0 0 10px #3b82f6;
}

/* LOADING BAR */
.bar {
    width:100%;
    height:8px;
    background:#111;
    margin-top:20px;
    border-radius:10px;
    overflow:hidden;
}

.progress {
    height:100%;
    width:0%;
    /* Progress bar changed to blue */
    background:#3b82f6;
    animation: load 6s linear forwards;
}

@keyframes load {
    from { width:0%; }
    to { width:100%; }
}

</style>
</head>

<body>

<div class="box">

    <img src="ART WIFI HOTSPOT LOGO TRANSPARENT.png.png" class="logo">

    <h1>✅ Connected!</h1>
    <p>Thank you for choosing</p>
    <p><strong>ART WIFI HOTSPOT</strong></p>

    <p>💰 Enjoy your internet time!</p>

    <div class="speed" id="speed">Speed: 0 Mbps</div>

    <div class="bar">
        <div class="progress"></div>
    </div>

    <p id="countdown">Redirecting in 6 seconds...</p>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
// PLAY SOUND
document.getElementById("sound").play().catch(()=>{});

// SPEED ANIMATION
let speed = 0;
let speedInterval = setInterval(()=>{
    speed += Math.floor(Math.random() * 10);
    if(speed > 100) speed = 100;

    document.getElementById("speed").innerHTML = "Speed: " + speed + " Mbps";
},300);

// COUNTDOWN + REDIRECT
let seconds = 6;

let countdown = setInterval(()=>{
    seconds--;

    document.getElementById("countdown").innerHTML =
        "Redirecting in " + seconds + " seconds...";

    if(seconds <= 0){
        clearInterval(countdown);
        clearInterval(speedInterval);

        window.location.href = "https://google.com";
    }

},1000);
</script>

</body>
</html>
