<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART WIFI | Status Suite</title>
    <style>
        :root {
            /* Ang iyong requested color */
            --primary-blue: #3b82f6;
            --blue-glow: 0 0 20px rgba(59, 130, 246, 0.5);
            --bg-dark: #0f1216;
            --card-bg: #1a1f26;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Bouncing Animation for Logo */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-12px); }
            60% { transform: translateY(-6px); }
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), var(--blue-glow);
            width: 320px;
            text-align: center;
        }

        .logo-container {
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            max-width: 135px;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
            animation: bounce 2s infinite;
        }

        h2 {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 20px 0;
            color: var(--primary-blue);
            text-shadow: var(--blue-glow);
        }

        /* Pantay-pantay na Box System */
        .info-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            box-sizing: border-box; /* Pinapanatili ang sukat kahit may padding */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; /* Center content horizontally */
            min-height: 85px; /* Fixed height para pantay lahat */
            width: 100%; /* Pantay na width */
        }

        .label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .value {
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
        }

        /* Action Buttons */
        .btn {
            width: 100%;
            height: 48px; /* Fixed height para pantay sa boxes */
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-refresh {
            background: transparent;
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
        }

        .btn-refresh:hover {
            background: var(--primary-blue);
            color: #000;
            box-shadow: var(--blue-glow);
        }

        .btn-logout {
            background: #ff3333;
            color: white;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.3);
        }

        .btn-logout:hover {
            background: #ff5555;
            transform: translateY(-2px);
        }

        .footer-note {
            font-size: 0.65rem;
            color: #444;
            margin-top: 25px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="logo.png" alt="ART WIFI LOGO" class="logo">
    </div>

    <h2>System Status</h2>

    <div class="info-box">
        <span class="label">Time Remaining</span>
        <span class="value" id="timeLeft">$(remaining_time)</span>
    </div>

    <div class="info-box">
        <span class="label">Device MAC</span>
        <span class="value" style="font-size: 0.9rem; color: #aaa;">$(client_mac)</span>
    </div>

    <button class="btn btn-refresh" onclick="location.reload()">Update Status</button>
    
    <a href="http://portal.tplink.net/logout" class="btn btn-logout">Terminate Session</a>

    <div class="footer-note">
        POWERED BY ART WIFI ADMIN SUITE v2.0
    </div>
</div>

<script>
    // Dinagdagan ko ng logic para mag-pula ang oras pag malapit na maubos
    const timeDisplay = document.getElementById('timeLeft');
    const timeStr = timeDisplay.innerText;
    
    // Check kung less than 5 minutes na lang
    if(timeStr.includes('00:00:') || timeStr.includes('00:01:') || timeStr.includes('00:04:')) {
        timeDisplay.style.color = '#ff3333';
        timeDisplay.style.textShadow = '0 0 10px rgba(255, 51, 51, 0.5)';
    }
</script>

</body>
</html>
