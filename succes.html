<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART WIFI | Status Suite</title>
    <style>
        :root {
            --primary-blue: #3b82f6;
            --neon-glow: 0 0 20px rgba(59, 130, 246, 0.6);
            --bg-dark: #020617;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-bright: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: var(--text-bright);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.2); }
            100% { border-color: rgba(59, 130, 246, 0.8); }
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), var(--neon-glow);
            width: 340px;
            text-align: center;
            position: relative;
            animation: pulse-border 3s infinite alternate;
        }

        .logo-container {
            margin-bottom: 25px;
        }

        .logo {
            max-width: 140px;
            filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.4));
            animation: bounce 3s ease-in-out infinite;
        }

        h2 {
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0 0 20px 0;
            color: var(--primary-blue);
            opacity: 0.8;
        }

        /* Glassmorphism Info Boxes */
        .status-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            transition: transform 0.3s ease;
        }

        .info-box:hover {
            transform: scale(1.02);
            background: rgba(15, 23, 42, 0.8);
        }

        .label {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .value {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* Modern Actions */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            height: 52px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: none;
        }

        .btn-refresh {
            background: var(--primary-blue);
            color: white;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-refresh:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
        }

        .btn-logout {
            background: transparent;
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #ff6b6b;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.6rem;
            color: #475569;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="ART WIFI HOTSPOT LOGO TRANSPARENT.png.png" alt="ART WIFI" class="logo">
    </div>

    <h2>Network Access</h2>

    <div class="status-grid">
        <div class="info-box">
            <span class="label">Session Remaining</span>
            <span class="value" id="timeLeft">$(remaining_time)</span>
        </div>

        <div class="info-box">
            <span class="label">Access Client</span>
            <span class="value" style="font-size: 0.8rem; color: #64748b;">$(client_mac)</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-refresh" onclick="location.reload()">Refresh Data</button>
        <a href="http://portal.tplink.net/logout" class="btn btn-logout">Terminate Session</a>
    </div>

    <div class="footer">
        POWERED BY • ART WIFI HOTSPOT • 2026
    </div>
</div>

<script>
    const timer = document.getElementById('timeLeft');
    const status = timer.innerText;
    
    // Auto-warning color for low time
    if(status.includes('00:0') || status.includes('00:04')) {
        timer.style.color = '#f59e0b';
        timer.style.textShadow = '0 0 15px rgba(245, 158, 11, 0.5)';
    }
</script>

</body>
</html>
